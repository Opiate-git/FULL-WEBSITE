<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Mall Portal</title>
    <style>
        :root { --bg: #1a1a1a; 
                --secondary: #2d2d2d; 
                --accent: #8b0000; 
                --text: #e0e0e0; 
                }
        body { font-family: sans-serif; 
               background: radial-gradient(#ffffff22 1px, transparent 1px), 
                           linear-gradient(135deg, #8b0000 0%, #1a1a1a 100%);
               background-size: 30px 30px, 100% 100%;
               margin: 0; min-height: 100vh;
               color: var(--text); }

        .page { display: flex; 
                justify-content: center;
                align-items: center; 
                min-height: 100vh; 
                }
        .card { background: var(--secondary); 
                padding: 2rem; 
                border-radius: 12px; 
                width: 700px;
                height: 300px;
                text-align: center;
                background-image: url('logo.png');
                background-repeat: no-repeat;
                background-position: center;
                background-size: contain; 
                position: relative; 
                }
        #adminPanel { width: 100%; 
                      display: none; 
                      }
        nav {   background: var(--secondary); 
                padding: 1rem 2rem; 
                display: flex; 
                align-items: center;
                gap: 15px;
                justify-content: space-between; 
                border-bottom: 2px solid var(--accent); 
                }
        .nav-left { 
                display: flex; 
                align-items: center; 
                gap: 15px;
                }   
        .nav-logo { 
                height: 40px;
                width: auto;
                }
        .nav-links { 
                display: flex;     
                gap: 20px;   
                align-items: center; 
                }
        .nav-link { 
                cursor: pointer; 
                font-weight: bold;
                margin-left: 20px; 
                }
        .nav-links button {
                padding: 5px 15px;
                font-size: 0.9rem;
                margin-left: 20px;
                }
        .content { padding: 2rem; 
                }
        .view { background: var(--secondary);
                padding: 2rem;
                border-radius: 12px;
                margin-bottom: 1rem; 
                }
        input { width: 100%;
                padding: 10px;
                margin: 8px 0;
                border: 1px solid var(--accent);
                border-radius: 5px;
                box-sizing: border-box;
                }
        button { background: var(--accent);
                 color: white;
                 padding: 10px 20px;
                 border: none;
                 border-radius: 5px;
                 cursor: pointer; 
                }
        .hidden { display: none; }

        /* İstatistik Kart*/
        .stats-grid { display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 20px; margin-top: 20px; 
            }
        .stat-card { background: var(--secondary);
                padding: 20px; border-radius: 8px;
                border: 1px solid #444;
                text-align: center; }

        /* Tablo */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
            background: var(--secondary); 
            border-radius: 8px; 
            overflow: hidden; 
            }
        td 
            { 
            padding: 12px; 
            border: 1px solid #444; 
            text-align: left; 
            }
        th {
            background: rgba(139, 0, 0, 0.2);
            padding: 12px; 
            border: 1px solid #444; 
            text-align: left;
            }
        .btn-action { 
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px; 
            border: none; margin: 2px; 
            }
        .btn-update { 
            background: #28a745; 
            color: white; 
            }
        .btn-delete { 
            background: #dc3545;
            color: white; 
            }
    </style>
</head>
<body>

    <div id="loginPage" class="page">
        <div class="card">
            <h2>Digital Mall Login</h2>
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <button onclick="toggleView('loginPage', 'adminPanel')">Login</button>
        </div>
    </div>

    <div id="adminPanel">
        <nav>
            <div class="nav-left">
                <img src="logo.png" class="nav-logo" alt="Logo">
                <strong>ADMIN PANEL</strong>
            </div>

            <div class="nav-links">
                <span class="nav-link" onclick="show('home')">Home</span>
                <span class="nav-link" onclick="show('users')">Manage Users</span>
                <span class="nav-link" onclick="show('shops')">Manage Shops</span>
                <button onclick="window.location.href='index.html'">Logout</button>
            </div>
        </nav>
        
        <div class="content">
            <div id="home" class="view">
                <h1>Dashboard</h1>
                <div class="stats-grid">
                    <div class="stat-card"><h3>120</h3><p>Total Users</p></div>
                    <div class="stat-card"><h3>45</h3><p>Active Shops</p></div>
                </div>
            </div>

            <div id="users" class="view hidden">
                <h1>Manage Users</h1>
                <table>
                    <tr><th>Name</th><th>Email</th><th>Number</th><th>Action</th></tr>
                    <tr><td>Cemre</td><td>cemre@test.com</td><td>555-0001</td>
                        <td><button class="btn-action btn-update">Update</button><button class="btn-action btn-delete">Delete</button></td>
                    </tr>
                </table>
            </div>

            <div id="shops" class="view hidden">
                <h1>Manage Shops</h1>
                <table>
                    <tr><th>Name</th><th>Date</th><th>Status</th><th>Sub. Dates</th><th>Action</th></tr>
                    <tr><td>shop1</td><td>08.03.2026</td><td>Active</td><td>2026-12-01</td>
                        <td><button class="btn-action btn-update">Update</button><button class="btn-action btn-delete">Delete</button></td>
                    </tr>
                </table>
            </div>
        </div>
    </div>

    <script>
        function toggleView(hide, show) {
            document.getElementById(hide).style.display = 'none';
            document.getElementById(show).style.display = 'block';
        }
        function show(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
